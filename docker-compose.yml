services:
  db:
    image: postgres:16-alpine
    container_name: lieferdienst_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lieferdienst
      POSTGRES_PASSWORD: lieferdienst
      POSTGRES_DB: lieferdienst
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lieferdienst -d lieferdienst"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: lieferdienst_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://lieferdienst:lieferdienst@db:5432/lieferdienst
      SECRET_KEY: change-me-in-production
    ports:
      - "8000:8000"
    volumes:
      # Bind-Mount fuers Backend-Team: Code-Aenderungen wirken sofort, ohne neu zu bauen
      - ./backend/app:/app/app
      - ./backend/seed.py:/app/seed.py
      # Hochgeladene Produktbilder bleiben erhalten, auch wenn der Container neu gebaut wird
      - product_images:/app/app/static/product_images
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_API_URL zeigt immer auf localhost, weil der Browser
        # ausserhalb des Docker-Netzwerks laeuft und "backend" dort nicht
        # aufgeloest werden kann.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: lieferdienst_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # API_URL_INTERNAL wird fuer Server-seitige Requests genutzt (im Docker-Netz).
      API_URL_INTERNAL: http://backend:8000
    depends_on:
      - backend

volumes:
  db_data:
  product_images:
